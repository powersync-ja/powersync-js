packages:
  - demos/*
  - packages/*
  - tools/*
  - docs/

catalogs:
  # When we have a public peer-dependency on another package, we may want to declare
  # support for older versions too (to avoid breaking users).
  # So, the default catalog (typically used for dev-dependencies) references a recent
  # version, and the api catalog references the minimum version.
  api:
    drizzle-orm: "<1.0.0"
    "@capacitor-community/sqlite": ^7.0.2
    "@op-engineering/op-sqlite": "^13.0.0 || ^14.0.0 || ^15.0.0"

