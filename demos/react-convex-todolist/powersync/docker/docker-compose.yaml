# Composed PowerSync Docker stack (generated by powersync docker configure).
# Modules add entries to include and to services.powersync.depends_on.
# Relative paths: . = powersync/docker, .. = powersync.
# Include syntax requires Docker Compose v2.20.3+

name: powersync_react-convex-todolist

include:
  - modules/mongo-storage.compose.yaml
  - modules/convex.compose.yaml

services:
  powersync:
    restart: unless-stopped
    # TODO update before merge
    image: ps
    # image: journeyapps/powersync-service:0.0.0-dev-20260512083249
    # We change this in order to load the Convex secret, which is output after running the convex-keygen
    # Docker Compose service
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export PS_CONVEX_DEPLOY_KEY=$$(cat /setup/deploy_key)
        exec node service/lib/entry.js start -r unified
    volumes:
      # Passes the Convex key to this service
      - ./setup_data:/setup
      # PowerSync config files
      - ../service.yaml:/config/service.yaml
      - ../sync-config.yaml:/config/sync-config.yaml
    environment:
      POWERSYNC_CONFIG_PATH: /config/service.yaml
      NODE_OPTIONS: --max-old-space-size=1000
      PS_CONVEX_DEPLOYMENT_URL: http://backend:${PS_CONVEX_PORT:-3210}
      PS_JWKS_URL: http://backend:3211/.well-known/jwks.json
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:${PS_PORT:-8080}/probes/liveness').then(r =>
          r.ok ? process.exit(0) : process.exit(1)).catch(() =>
          process.exit(1))"
      interval: 5s
      timeout: 1s
      retries: 15
    ports:
      - "${PS_PORT:-8080}:${PS_PORT:-8080}"
    depends_on:
      mongo-rs-init:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
