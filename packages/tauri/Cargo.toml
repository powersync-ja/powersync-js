[package]
name = "tauri-plugin-powersync"
version = "0.0.1"
authors = [ "POWERSYNC" ]
description = "Rust parts of the PowerSync Tauri SDK"
edition = "2021"
rust-version = "1.77.2"
exclude = ["/examples", "/dist-js", "/guest-js", "/node_modules"]
links = "tauri-plugin-powersync"
readme = "README.md"
license = "Apache-2.0"
documentation = "https://docs.powersync.com/client-sdks/reference/tauri"
homepage = "https://powersync.com/"
repository = "https://github.com/powersync-ja/powersync-js/tree/main/packages/tauri"

[dependencies]
tauri = { version = "2.10.3" }
serde = "1"
serde_json = { version = "1", features = ["raw_value"] }
thiserror = "2"
powersync = { version = "0.0.5", features = ["tokio", "reqwest"] }
reqwest = "0.13.2"
http-client = { version = "6.5.3", default-features = false }
rusqlite = { version = "0.39.0", features = ["bundled"] }
tokio = { version = "1.50.0", features = ["time"] }
tokio-stream = "0.1"

[build-dependencies]
tauri-plugin = { version = "2.5.4", features = ["build"] }
